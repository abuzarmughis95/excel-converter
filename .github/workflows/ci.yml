name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  js:
    name: JS / TS (lint, typecheck, test, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run typecheck
      - run: pnpm run test
      - run: pnpm run build

      - name: Electron smoke test (boots then exits)
        # xvfb provides a virtual display for the headless CI runner. The app
        # quits itself via LEDGERLINE_SMOKE after the window is ready.
        run: xvfb-run --auto-servernum pnpm --filter @ledgerline/desktop smoke
        env:
          ELECTRON_RUN_AS_NODE: ''

  python:
    name: Python (ruff, mypy, pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ledgerline
          POSTGRES_PASSWORD: ledgerline_dev_only
          POSTGRES_DB: ledgerline
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ledgerline"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # PostgreSQL integration tests activate when this is set.
      LEDGERLINE_TEST_PG_URL: postgresql+psycopg://ledgerline:ledgerline_dev_only@localhost:5432/ledgerline
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: mypy
      - run: pytest

      - name: Alembic migration smoke on SQLite (upgrade + downgrade + upgrade)
        env:
          LEDGERLINE_DATABASE_URL: sqlite:///./ci_migration_check.sqlite
        run: |
          alembic upgrade head
          alembic downgrade base
          alembic upgrade head

      - name: Alembic migration smoke on PostgreSQL
        env:
          LEDGERLINE_DATABASE_URL: postgresql+psycopg://ledgerline:ledgerline_dev_only@localhost:5432/ledgerline
        run: |
          alembic upgrade head
          alembic downgrade base
          alembic upgrade head

  engine:
    name: Accounting engine + golden vectors (gate)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: mypy

      # The accounting core must be correct: lint, types, full suite (incl. the
      # golden test-vector runner) at >=95% coverage. A failing vector fails CI.
      - run: pytest

      # Belt-and-braces: run ONLY the golden vectors and fail loudly if the
      # suite somehow contains zero vectors.
      - name: Golden vectors must be present and pass
        run: pytest tests/test_golden_vectors.py -q

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
